name: CI

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".pi/**"
      - "package.json"
      - ".github/workflows/site-building.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".pi/**"
      - "package.json"
      - ".github/workflows/site-building.yml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Install root dependencies
        run: npm ci

      - name: Run catalog script tests
        run: npm test
