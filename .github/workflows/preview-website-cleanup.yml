name: Preview Website Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

env:
  CF_PAGES_PROJECT: skills-website-staging

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Cloudflare Pages preview for closed PR
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BRANCH="pr-${PR_NUMBER}"
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}/deployments"

          echo "Listing preview deployments for branch ${BRANCH}..."
          DEPLOYMENT_IDS=$(curl -sS "$API" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r --arg BRANCH "$BRANCH" '.result[] | select(.deployment_trigger.metadata.branch == $BRANCH) | .id')

          if [ -z "$DEPLOYMENT_IDS" ]; then
            echo "No preview deployments found for ${BRANCH}."
            exit 0
          fi

          echo "$DEPLOYMENT_IDS" | while read -r DEPLOYMENT_ID; do
            [ -z "$DEPLOYMENT_ID" ] && continue
            echo "Deleting deployment ${DEPLOYMENT_ID} (${BRANCH})..."
            curl -sS -X DELETE "${API}/${DEPLOYMENT_ID}?force=true" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | jq -e '.success == true' >/dev/null
          done

          echo "Cleanup complete for ${BRANCH}."
