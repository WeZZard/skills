name: Register Plugin Website

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: Plugin name (e.g. my-plugin)
        required: true
        type: string
      repo:
        description: Source repository (default WeZZard/<plugin>)
        required: false
        type: string

concurrency:
  group: register-plugin-website-${{ github.event.inputs.plugin }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  register:
    runs-on: ubuntu-latest
    env:
      OPENCODE_MODEL: ${{ secrets.OPENCODE_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install website dependencies (for toml via hoisting)
        working-directory: website
        run: npm ci

      - name: Setup OpenCode
        uses: ./.github/actions/setup-opencode
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
          OPENCODE_MODEL: ${{ secrets.OPENCODE_MODEL }}

      - name: Resolve inputs
        id: inputs
        env:
          PLUGIN: ${{ github.event.inputs.plugin }}
          REPO: ${{ github.event.inputs.repo }}
        run: |
          set -euo pipefail
          if [ -z "$PLUGIN" ]; then
            echo "plugin is required" >&2
            exit 1
          fi
          if [ -z "$REPO" ]; then
            REPO="WeZZard/${PLUGIN}"
          fi
          {
            echo "plugin=$PLUGIN"
            echo "repo=$REPO"
          } >> "$GITHUB_OUTPUT"

      - name: Register plugin in website registry
        run: |
          node scripts/register-plugin-website.mjs \
            --plugin "${{ steps.inputs.outputs.plugin }}" \
            --repo "${{ steps.inputs.outputs.repo }}"

      - name: Update website JSON
        run: node scripts/update-plugin-website.mjs --plugin "${{ steps.inputs.outputs.plugin }}"

      - name: Update workflow JSON
        run: node scripts/update-plugin-workflow.mjs --plugin "${{ steps.inputs.outputs.plugin }}"

      - name: Regenerate README
        run: node scripts/generate-readme.mjs

      - name: Validate marketplace
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate .

      - name: Create registration PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CATALOG_SYNC_TOKEN }}
          branch: register-website/${{ steps.inputs.outputs.plugin }}
          delete-branch: true
          commit-message: "chore(website): register ${{ steps.inputs.outputs.plugin }}"
          title: "chore(website): register ${{ steps.inputs.outputs.plugin }} for website"
          body: |
            Registers `${{ steps.inputs.outputs.plugin }}` in `catalog/website-registry.json`
            and generates initial website JSON.

            Does **not** add or change marketplace pins — run catalog sync after a plugin release.
