# Hand-edited entry VALUES are preserved forever, but comments and formatting are normalized whenever any entry regenerates.

[skills.be-thorough]
display_name = "Be Thorough"
tagline = "Investigate, verify, and test before you conclude."
short_summary = "Forces rigorous investigation, evidence gathering, and testing before drawing conclusions."
full_summary = "Be Thorough is a skill that enforces a disciplined approach to problem-solving and decision-making. It requires you to investigate, gather evidence, verify assumptions against references, and test your hypotheses before reaching any conclusion. This prevents shallow reasoning and ensures robust, reliable outcomes, especially in debugging, diagnosis, and review scenarios."
source_hash = "72223a7c65e622df"
content_hash = "0f149c2c4c76fae9"

[[skills.be-thorough.highlights]]
title = "Evidence-Based Conclusions"
description = "Forces you to support every assumption with concrete evidence before concluding. No guesswork or leaps of logic are allowed."

[[skills.be-thorough.highlights]]
title = "Reference Verification"
description = "Requires cross-checking assumptions against authoritative references, ensuring your reasoning is grounded in facts."

[[skills.be-thorough.highlights]]
title = "Mandatory Testing"
description = "Demands that you test your assumptions and hypotheses before finalizing any conclusion, reducing the risk of errors."

[[skills.be-thorough.workflow]]
name = "Investigate First"
description = "Begin by gathering information without jumping to conclusions."
details = "Conduct a thorough investigation of the problem or claim. Collect all relevant data, logs, and context before forming any hypothesis."

[[skills.be-thorough.workflow]]
name = "Gather Evidence"
description = "Support each assumption with concrete evidence."
details = "For every assumption you make, find and document supporting evidence. Do not rely on intuition or incomplete data."

[[skills.be-thorough.workflow]]
name = "Verify References"
description = "Cross-check assumptions against reliable sources."
details = "Validate your assumptions by consulting documentation, code, or other authoritative references. Ensure alignment with known facts."

[[skills.be-thorough.workflow]]
name = "Test Assumptions"
description = "Run tests to confirm your hypotheses."
details = "Design and execute tests that validate or invalidate your assumptions. Use the results to refine your understanding."

[[skills.be-thorough.workflow]]
name = "Conclude Only After"
description = "Draw conclusions only after all steps are complete."
details = "Do not conclude until investigation, evidence, verification, and testing are all done. This ensures robust and reliable outcomes."

[skills.brainstorming]
display_name = "Brainstorming"
tagline = "Turn ideas into fully formed designs through collaborative dialogue"
short_summary = "Diverge through many options, clarify your purpose by reacting to them, then connect the survivors into a design that previews the plan"
full_summary = "This skill turns rough ideas into complete designs through natural conversation. It diverges first — exposing many options and studying each in its own subagent to keep the conversation clean — then lets your purpose sharpen as you react to those options, then connects the survivors into a coherent design. As it converges it previews the same design components and task graph that the write-plan skill will formalize, so entering plan mode formalizes what you already discussed instead of introducing new structure."
source_hash = "a70f9d5f12e7c5e2"
content_hash = "60c858e5676dc7c6"

[[skills.brainstorming.highlights]]
title = "One Question at a Time"
description = "The skill asks questions one at a time to avoid overwhelming you and ensure clear understanding. This focused approach helps refine your idea gradually while keeping the conversation natural and productive."

[[skills.brainstorming.highlights]]
title = "Diverge Before Converging"
description = "The skill exposes many options before narrowing and studies each one in its own subagent, so deep research stays out of the conversation. It then draws out your purpose by having you react to concrete choices rather than answer abstract questions."

[[skills.brainstorming.highlights]]
title = "Progressive Disclosure"
description = "As the design converges, the skill previews the same design components and task graph the plan will use. By the time you enter plan mode, write-plan formalizes what you already discussed instead of surprising you with new structure."

[[skills.brainstorming.highlights]]
title = "Information Validation"
description = "All external information is verified for credibility and recency before being used. The skill checks sources, dates, and resolves conflicts to ensure you're working with accurate, up-to-date information."

[[skills.brainstorming.highlights]]
title = "Incremental Design Review"
description = "Designs are presented in small, manageable sections of 200-300 words. After each section, you're asked for feedback to ensure everything looks right before moving forward, preventing major rework later."

[[skills.brainstorming.highlights]]
title = "Project Context Aware"
description = "The skill starts by understanding your current project state, including files, documentation, and recent changes. This context-aware approach ensures solutions fit seamlessly into your existing work."

[[skills.brainstorming.workflow]]
name = "Diverge — Expose Choices"
description = "Surface many candidate options and study each one in isolation."
details = "The skill grounds itself in your project (files, docs, recent commits), then names many candidate options and spawns a subagent per option to gather web-grounded, validated facts and return a compact brief. Only the briefs come back to the conversation, so divergence stays clean."

[[skills.brainstorming.workflow]]
name = "Clarify — Sharpen Purpose"
description = "Sharpen what you want by reacting to the options on the table."
details = "The skill asks focused questions one at a time, anchored to the options it surfaced, and pins down your user stories, constraints, and success criteria. Diverge and Clarify interleave: your reactions reshape which options stay in play."

[[skills.brainstorming.workflow]]
name = "Connect — Build the Design"
description = "Connect the surviving options into a design, validated section by section."
details = "The skill connects the survivors into a coherent design, presented in 200-300 word sections you validate one at a time. It organizes the design by the same components the plan will use and sketches the tasks and their dependencies, previewing what write-plan formalizes."

[[skills.brainstorming.workflow]]
name = "Update Plan"
description = "If in plan mode, automatically update your project plan with the new design."
details = "When working with project plans, the skill seamlessly updates your plan file with the newly developed design, keeping your documentation current without requiring manual updates."

[skills.divide-and-conquer]
display_name = "Divide and Conquer"
tagline = "Break big jobs into parallel, subagent-driven task graphs"
short_summary = "Decomposes wide fan-out work into a folded task graph run across isolated subagent contexts, with only handles crossing the orchestrator."
full_summary = "Divide and conquer turns a large job into a folded task graph of typed nodes — agent, fn, expand, and switch — executed on the amplify engine. Independent work fans out across isolated subagent contexts while values pass by reference so payload bytes never flood the orchestrator. It supports both human-reviewed decomposition of bare prompts and direct execution of skills that ship their own authored graphs."
source_hash = "e6093baa28025df6"
content_hash = "cff078293595d7b1"

[[skills.divide-and-conquer.highlights]]
title = "Isolated Subagent Fan-Out"
description = "Each parallel unit runs in its own subagent context, so wide fan-outs never degrade a single long context. One agent per unit means independent work scales horizontally instead of serially."

[[skills.divide-and-conquer.highlights]]
title = "Typed Folded Task Graph"
description = "Graphs compose from four node kinds — agent for non-deterministic work, fn for pure transforms, expand for fan-out, and switch for branching. Every node carries an explicit output_schema and the engine validates the whole shape before running."

[[skills.divide-and-conquer.highlights]]
title = "Values by Reference, Never Bytes"
description = "The orchestrator only handles ids and handles; payload bytes stay out of its context. Cross-node data flows through the value store, keeping the orchestrator lean and the contexts clean."

[[skills.divide-and-conquer.highlights]]
title = "Two Entry Modes"
description = "Mode A decomposes a bare prompt into a draft graph for human review and editing before running. Mode B loads and runs a skill that ships its own authored graph plus helper modules, with no review gate."

[[skills.divide-and-conquer.workflow]]
name = "Decompose or Load"
description = "Spawn a sub-agent to draft a graph, or load a skill's shipped graph.json."
details = "Mode A spawns one decomposition sub-agent that turns the bare prompt into a draft folded-graph declaration with a real expand fan-out and gather reducer. Mode B loads an authored graph plus its fn modules directly."

[[skills.divide-and-conquer.workflow]]
name = "Validate the Graph"
description = "Validate against the task-graph schema and dry-run init."
details = "Write the draft to a temp file, validate against task-graph.schema.json, and dry-run task.mjs init to exercise the engine's validateGraph — rejecting unknown types, dangling deps, and missing output_schema."

[[skills.divide-and-conquer.workflow]]
name = "Human Review and Edit"
description = "Present the validated draft for plan-mode review before running."
details = "Surface the fan-out width, per-unit work, and gather step via the plan gate. The human may edit nodes, prompts, the unit list, or schemas before approving. Re-validate after any edit. Mode B skips this gate."

[[skills.divide-and-conquer.workflow]]
name = "Run the Scheduling Loop"
description = "Drive the graph through the execute-plan scheduling loop."
details = "init captures the GRAPH_ID, then ready / dispatch agent in the background / exec-node for fn, expand, and switch, honoring the concurrency window and the single-writer commit lock."

[[skills.divide-and-conquer.workflow]]
name = "Gather Results"
description = "Reduce per-unit outputs with an all-resolved gather fn."
details = "An fn reducer with require all-resolved gathers successes even when some children fail, so partial results always collect and one failure never sinks the run. Present the gathered result to the user."

[skills.execute-plan]
display_name = "Execute Plan"
tagline = "Turn your development plans into working code with automated execution and human oversight."
short_summary = "Automatically executes development plans, implementing and auditing each task before its successors run."
full_summary = "This skill transforms finalized development plans into implemented code through automated execution. A structured-concurrency engine runs each task as an implement-and-audit unit: an implementer subagent does the work and a separate blind auditor verifies it against the task's acceptance criteria before dependent tasks start. Tasks run in parallel while respecting dependencies, human verification gates pause execution at critical steps, and a final audit table reports every task's verdict."
source_hash = "52a92bbff7ba4a41"
content_hash = "fbf4feda7f9553e6"

[[skills.execute-plan.highlights]]
title = "Parallel Task Execution"
description = "Maximizes development speed by processing multiple tasks simultaneously while respecting dependencies. This approach significantly reduces implementation time compared to sequential execution."

[[skills.execute-plan.highlights]]
title = "Human Verification Gates"
description = "Automatically pauses execution at critical points to request human verification. This ensures important decisions receive proper oversight while maintaining automation efficiency."

[[skills.execute-plan.highlights]]
title = "Automatic Block Detection"
description = "Stops execution immediately when encountering blockers like missing dependencies, test failures, or unclear instructions. Prevents wasted effort by asking for clarification rather than guessing."

[[skills.execute-plan.highlights]]
title = "Plan-First Approach"
description = "Requires a finalized plan file before starting implementation, ensuring structured development. Follows plan steps exactly while maintaining flexibility for necessary adjustments."

[[skills.execute-plan.workflow]]
name = "Load Plan"
description = "Read and validate the finalized development plan file."
details = "The skill begins by loading the plan file to understand the implementation requirements. This ensures all tasks and dependencies are properly identified before execution begins."

[[skills.execute-plan.workflow]]
name = "Execute Tasks"
description = "Process tasks in parallel while respecting dependencies."
details = "Tasks are executed simultaneously to maximize efficiency, with careful attention to dependencies that require sequential processing. This balanced approach optimizes development speed."

[[skills.execute-plan.workflow]]
name = "Request Verification"
description = "Pause execution for human verification when required."
details = "At critical points specified in the plan, execution stops to request human verification. This ensures important decisions receive proper oversight before proceeding."

[[skills.execute-plan.workflow]]
name = "Handle Feedback"
description = "Apply changes based on verification feedback and continue."
details = "After receiving verification feedback, the skill applies any necessary changes and continues execution. This iterative process continues until all tasks are completed."

[skills.same-page]
display_name = "Same Page"
tagline = "Re-explain your reasoning with evidence and visuals so users truly understand."
short_summary = "Re-explains previous messages with evidence, confidence levels, and ASCII diagrams tailored to the content."
full_summary = "Same Page helps users understand your reasoning by re-explaining previous messages in a clear, structured format. It dynamically designs the explanation shape based on the prior message—using evidence blocks, comparison tables, flow diagrams, or other layouts—and always includes at least one ASCII visualization. Each claim is backed by concrete evidence with a confidence rating (High/Medium/Low), ensuring transparency and trust."
source_hash = "030c9e18b8210a0f"
content_hash = "c1b6692c22c92a46"

[[skills.same-page.highlights]]
title = "Dynamic Explanation Design"
description = "The explanation format adapts to the prior message: narrative arcs for single decisions, comparison tables for trade-offs, flow diagrams for processes, and more. No rigid templates."

[[skills.same-page.highlights]]
title = "Evidence with Confidence"
description = "Every claim is supported by specific evidence (file, line, URL, command output) and rated High/Medium/Low with a basis. Low-confidence claims are explicitly flagged."

[[skills.same-page.highlights]]
title = "ASCII Visualizations"
description = "At least one ASCII diagram per explanation, chosen dynamically: flow diagrams for processes, trees for hierarchies, tables for comparisons, etc. Compact and terminal-friendly."

[[skills.same-page.highlights]]
title = "Re-verify, Don't Recall"
description = "Re-reads source files and re-runs commands to ensure accuracy, rather than relying on memory of earlier tool calls. Honest and up-to-date."

[[skills.same-page.workflow]]
name = "Identify Key Claims"
description = "Extract key claims from the last substantive message."
details = "Look at the most recent substantive message, extract decisions, facts, and recommendations. Group claims into 2-5 themes if the message is long."

[[skills.same-page.workflow]]
name = "Design Explanation Format"
description = "Choose a layout that fits the prior message."
details = "Select from narrative arcs, per-claim sections, comparison tables, flow diagrams, confidence overviews, or timelines. State the format choice briefly."

[[skills.same-page.workflow]]
name = "Gather Evidence & Rate Confidence"
description = "Support each claim with concrete evidence and a confidence level."
details = "For each claim, cite specific artifacts (file, line, URL, command output). Rate confidence High/Medium/Low with a one-line basis. Re-read files and re-run commands as needed."

[[skills.same-page.workflow]]
name = "Create ASCII Visualization"
description = "Design at least one ASCII diagram to clarify structure."
details = "Choose a visual style (flow, tree, stack, table, graph) that matches the content. Keep diagrams under ~20 lines and ~72 columns. Add a one-line caption."

[[skills.same-page.workflow]]
name = "Close with Synthesis"
description = "End with a summary, caveats, or next steps."
details = "Provide a short synthesis, checklist of caveats, or 'what to verify next'. Explicitly call out low-confidence areas and open questions."

[skills.write-plan]
display_name = "Write Plan"
tagline = "Create structured development plans with built-in verification and human oversight"
short_summary = "Generates comprehensive project plans with verification steps and human review gates"
full_summary = "The write-plan skill helps developers create detailed project plans before making changes. It ensures thorough documentation of files, hypotheses, and verification approaches while identifying when human review is needed. The skill produces structured plans with clear tasks and validation steps to guide development work."
source_hash = "1cb67d76aa2e565d"
content_hash = "e7b3ef5f004256d8"

[[skills.write-plan.highlights]]
title = "Mandatory Verification"
description = "Every plan must include verification steps with clear approaches (automated, manual, or hybrid). The skill recognizes hypotheses that need validation and ensures they're addressed before proceeding with implementation."

[[skills.write-plan.highlights]]
title = "Human Review Gates"
description = "Automatically identifies tasks requiring human verification based on four criteria: no computer use, subjective judgment, financial authorization, or security sensitivity. These tasks are prioritized at the start of the plan for early review."

[[skills.write-plan.highlights]]
title = "Structured Templates"
description = "Uses standardized templates for plan components including project structure, tech stack, architecture, and algorithm design. This ensures consistency and completeness across all development plans."

[[skills.write-plan.highlights]]
title = "Task Organization"
description = "Breaks down work into manageable tasks with clear dependencies and context awareness. Tasks are designed to be focused and appropriately sized for effective execution within context limitations."

[[skills.write-plan.workflow]]
name = "Skill Invocation"
description = "The skill is invoked at the start of planning with a specific announcement."
details = "Before updating any plan files, you must explicitly call the write-plan skill. This ensures the planning process follows the structured approach defined by the skill's requirements."

[[skills.write-plan.workflow]]
name = "Plan Creation"
description = "Generates a comprehensive plan using the mandatory template structure."
details = "Creates a plan document with sections for goals, tasks, and verification. The plan includes all necessary details assuming the user has zero context about the codebase, ensuring thorough documentation."

[[skills.write-plan.workflow]]
name = "Component Documentation"
description = "Documents project structure, tech stack, and architecture changes using specific templates."
details = "When changes affect these areas, the skill uses predefined templates to show both before and after states. This provides clear visualization of how the project will evolve."

[[skills.write-plan.workflow]]
name = "Verification Planning"
description = "Identifies verification needs and creates detailed testing approaches."
details = "Lists all verification steps needed to confirm the plan's success. This includes both automated testing approaches and manual verification requirements with specific test cases and assertions."

[[skills.write-plan.workflow]]
name = "Human Review Identification"
description = "Flags tasks requiring human verification and prioritizes them in the plan."
details = "Analyzes the plan to identify where human judgment is needed based on four specific criteria. These tasks are moved to the beginning of the plan to ensure early review and approval."
