[skills.ask-wezzard]
display_name = "Ask WeZZard"
tagline = "Report attune plugin failures as scrubbed issues in one step."
short_summary = "Classify, collect, and file a scrubbed attune failure report against the attune repository."
full_summary = "Ask WeZZard turns a broken attune skill or guideline into a structured GitHub issue, automatically scrubbing user-side detail and quoting the failing agent output verbatim. It distinguishes communication failures that feed the improvement loop from skill failures that name the broken protocol step. When gh is unavailable, the filled template prints in-session so no report is ever lost."
source_hash = "64ea0599dce43d4f"
content_hash = "3fa7d795e0bed174"

[[skills.ask-wezzard.highlights]]
title = "Two failure channels"
description = "Communication failures carry the extraction template the collect-feedback-and-improve loop consumes; skill failures carry the general template plus the skill and step that failed. Each lands under its own label."

[[skills.ask-wezzard.highlights]]
title = "Verbatim, scrubbed reports"
description = "Your own failing output is quoted word-for-word, while the user's reaction is paraphrased and no project code, secrets, or paths outside the plugin are included. Reports stay useful without leaking context."

[[skills.ask-wezzard.highlights]]
title = "Authoritative model detection"
description = "Reads the exact model ID from your system prompt on claude-code, or from attune's session-model store on codex and pi, with a rollout-file fallback. It writes unknown only when every source yields nothing."

[[skills.ask-wezzard.highlights]]
title = "Never-silent failure"
description = "If gh is missing, unauthenticated, or offline, the filled template prints in the conversation instead of being discarded. The report always reaches a human reviewable form."

[[skills.ask-wezzard.workflow]]
name = "Classify the failure"
description = "Decide communication vs. skill failure."
details = "Determine whether a reply broke the communication guidelines or another attune skill or guideline behaved wrongly, since each type takes a different template and label."

[[skills.ask-wezzard.workflow]]
name = "Collect context"
description = "Gather quotes, reaction, repair, and session info."
details = "Quote your failing output verbatim, paraphrase the reader's reaction in one line, propose a repair, and record language, platform, and model from the authoritative source for your platform."

[[skills.ask-wezzard.workflow]]
name = "File the issue"
description = "Create one labeled issue per failure."
details = "Run gh issue create against WeZZard/attune with the matching template and label, one issue per distinct failure so nothing is bundled or dropped."

[[skills.ask-wezzard.workflow]]
name = "Report back or fall back"
description = "Share the URL, or print the template."
details = "Give the user the issue URL; if gh fails for any reason, print the filled template in the conversation so the report is never lost silently."

[skills.definition-of-done]
display_name = "Definition of Done"
tagline = "A result is done only when it has survived its real use path, driven the way its consumer drives it."
short_summary = "Sets a universal standard for done-claims: every done rests on observed evidence from the result's use path, sized to the change's blast radius."
full_summary = "Holds every done, fixed, or working declaration to a single universal standard: the result must have survived its use path, driven through its real interface the way its real consumer drives it. Sizing scales with blast radius — Contained, User-facing, or Downstream — so effort matches risk while the happy path is always driven. Honest reporting separates verified forks from unverified ones, naming what could not be driven and why."
source_hash = "a9004ea82129e013"
content_hash = "672cca8cb919cdda"

[[skills.definition-of-done.highlights]]
title = "Blast-Radius Sizing"
description = "Every pass is sized first by the outermost circle a failure would reach — Contained, User-facing, or Downstream — so the depth of verification scales with the change's real risk. Sizing never skips the pass; even the smallest change drives its happy path."

[[skills.definition-of-done.highlights]]
title = "Driven, Not Reasoned"
description = "What should happen is a hypothesis, not an observation. Each fork is actually driven through its real interface and the output, state, and side effects recorded. Reading source to reason about runtime behavior is never driving — running it is."

[[skills.definition-of-done.highlights]]
title = "Three Execution Routes"
description = "Route 1 drives in-session when tools reach the interface; Route 2 autonomously re-checks load-bearing recalls against their primary source; Route 3 stops short of done when the interface is out of reach, reporting unverified with what could drive it."

[[skills.definition-of-done.highlights]]
title = "Honest Reporting by Fork"
description = "Verified and unverified are reported as different things, fork by fork. Re-checked claims are backed by quotes from their primary source, not restated conclusions. A fork that could not be driven is named with its reason and partial evidence."

[[skills.definition-of-done.workflow]]
name = "Announce and Size"
description = "Announce the standard; size the pass by blast radius before designing the use path."
details = "Declare \"Holding this to the definition of done,\" then judge the change's blast radius — Contained, User-facing, or Downstream — from the change itself, never its forks, taking the larger circle when two fit."

[[skills.definition-of-done.workflow]]
name = "Design the Use Path"
description = "Name the consumer, interface, and value; consult the matching domain playbook."
details = "Identify who drives the result and through what interface, let the happy path demonstrate the value gained, and load the matching references/use-paths playbook if the domain has one; follow it, or draft a new one when none exists."

[[skills.definition-of-done.workflow]]
name = "Drive the Forks"
description = "Walk each fork the size calls for through the real interface, recording what happened."
details = "Drive the happy path at every size; add internal forks at User-facing; add boundary forks at Downstream. Drive destructive and error paths against disposable state, or stop and report blocked when no safe target exists."

[[skills.definition-of-done.workflow]]
name = "Re-Check Load-Bearing Claims"
description = "Route 2 any recalled fact or inference the done-claim leans on, against its primary source."
details = "For claims not established by driving — a recalled API default, an inference, a carried conclusion — re-check against the originating artifact or vendor doc, quoting the source, autonomously via the audit skill when installed."

[[skills.definition-of-done.workflow]]
name = "Report Honestly by Fork"
description = "State what was driven and observed, and what stayed unverified with its reason."
details = "Report verified and unverified as distinct, fork by fork; back re-checked claims with primary-source quotes; name any undriven fork with the reason and partial evidence, including playbook honest limits and Route 3 out-of-reach interfaces."

[skills.experiment]
display_name = "Experiment"
tagline = "Settle subjective questions by blind, evidence-driven comparison."
short_summary = "Produce 2-4 candidate outputs, strip provenance, collect external judge verdicts, then let the user rule — no guessing."
full_summary = "When a question can only be answered by trying (not by research or direct user knowledge), this skill runs a controlled experiment. It frames a single criterion, produces 2–4 candidates (at least one by the main agent, the rest by pinned external agents), blinds them by shuffling and stripping provenance, and sends them to 2–3 different external judges for ranking with justification. The user receives the anonymized candidates and verdicts, rules on the winner, and only then sees the provenance mapping. The experimental directory is deleted as cleanup."

[[skills.experiment.highlights]]
title = "Single Criterion"
description = "Every experiment has exactly one criterion that the candidates compete on. A candidate set without a criterion is taste-polling, not an experiment."

[[skills.experiment.highlights]]
title = "Provenance Stripping"
description = "Candidates are shuffled into letter-named files (A, B, …) with all provenance hints removed. The letter-to-producer mapping is written to mapping.txt and never shown before the ruling."

[[skills.experiment.highlights]]
title = "External Judge Panel"
description = "2–3 different external agents, pinned by model, each receive the blinded candidates and criterion. Every judge ranks the candidates and justifies its ranking in two sentences."

[[skills.experiment.highlights]]
title = "Safe External Production"
description = "External agents never write to a repo directly. When a future experiment needs repo access, a git worktree is created first; changes are collected via worktree diff, merging stays an explicit main-thread step."

[[skills.experiment.workflow]]
name = "Frame & Produce"
description = "Name the experiment and write the criterion. Produce 2–4 candidates."
details = "Name the experiment (kebab-case) and define the single criterion. Render 2–4 candidates into a temp directory, producing at least one yourself and dispatching external-agent briefs for the rest."

[[skills.experiment.workflow]]
name = "Blind"
description = "Shuffle, strip provenance, write mapping."
details = "Copy candidates to letter-named files (A, B, …) in shuffled order, stripping all provenance hints. Write the letter-to-producer mapping to mapping.txt."

[[skills.experiment.workflow]]
name = "Judge"
description = "Send blinded candidates to 2–3 external judges in parallel."
details = "Each judge receives the letter-named candidates and the criterion via an external-agent brief (pinned by model, tagged auditing). Each ranks and justifies in two sentences."

[[skills.experiment.workflow]]
name = "Rule & Conclude"
description = "Present verdicts, user rules, reveal mapping, clean up."
details = "Show the candidates and anonymized verdicts to the user. The user rules. Reveal the provenance mapping only after the ruling, report the outcome, then delete the experiment directory."

[skills.explore]
display_name = "Explore"
tagline = "A four-move design discussion the model drives, the user rules."
short_summary = "Explore turns design talk into a disciplined four-move pass — Ask, Sort, Research, Experiment — where the model raises the hard questions and the user spends only judgment."
full_summary = "Explore runs a structured design discussion through Ask, Sort, Research, and Experiment. The model investigates purpose, generates real alternatives, hunts for shortcuts, and settles world facts through the cheapest sufficient source — bringing the user only their own facts and rulings, so decisions rest on evidence and taste, never assumptions."
source_hash = "bee38921b93523bd"
content_hash = "4438f555480e881f"

[[skills.explore.highlights]]
title = "Four Moves, Each Gated"
description = "Ask raises purpose, alternative, and shortcut questions aimed at the model itself. Sort classifies each as world fact, user-held fact, or judgment. Research settles world facts through memory, machine, then web. Experiment builds the answer nothing existing holds."

[[skills.explore.highlights]]
title = "The Model Drives, The User Rules"
description = "The model does the legwork — climbing the request's five levels, generating alternatives that differ in mechanism, and seeking shorter paths — so the user spends judgment on taste, priorities, and risk, never on research they could have done themselves."

[[skills.explore.highlights]]
title = "Cheapest Sufficient Source"
description = "Most questions end at memory or this machine without touching the web. Volatile facts are never treated as stable, load-bearing recalls are verified before the recommendation rests, and the web is gated behind a single scouting pass per settled intent."

[[skills.explore.highlights]]
title = "An Evidence Trail You Can Read"
description = "Web researchers write dated briefs to disk as the evidence trail; the thread carries only the compiled digest. Conflicts are resolved by authority and recency, unopened sources are marked unverified, and trials run against the real artifact — never a stub from memory."

[[skills.explore.workflow]]
name = "Ask"
description = "Raise purpose, alternatives, and shortcut questions aimed at the model."
details = "Investigate what the user is ultimately trying to make happen, climb the request's five levels, generate alternatives that differ in mechanism, and seek a shorter path — adding every question to a visible open list."

[[skills.explore.workflow]]
name = "Sort"
description = "Classify each open question once, before any work proceeds."
details = "Mark each question as a world fact, a user-held fact, or a judgment; route user-held facts and judgments to the user, and decompose compound questions so each part is routed on its own."

[[skills.explore.workflow]]
name = "Research"
description = "Settle world facts through the cheapest sufficient source."
details = "Move through memory, this machine, then the web — escalating only when a source cannot settle the question — and verify each load-bearing recalled fact before the pass presents its recommendation."

[[skills.explore.workflow]]
name = "Experiment"
description = "Build the answer nothing existing holds."
details = "When research finds nothing or sources conflict on an observable claim, run the smallest rig that yields the observation against the real artifact, recording every trial's command and output as created evidence."

[[skills.explore.workflow]]
name = "Present"
description = "Deliver the pass's understanding, alternatives, and recommendation."
details = "State purpose and intent, the alternatives explored, the strongest shortcut, the recommendation with rationale, and what remains unverified, assumed, or parked — each labeled as what it is."
