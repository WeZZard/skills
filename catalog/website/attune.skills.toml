# Hand-edited entry VALUES are preserved forever, but comments and formatting are normalized whenever any entry regenerates.

[skills.experiment]
display_name = "Experiment"
tagline = "Settle subjective questions by blind, evidence-driven comparison."
short_summary = "Produce 2-4 candidate outputs, strip provenance, collect external judge verdicts, then let the user rule — no guessing."
full_summary = "When a question can only be answered by trying (not by research or direct user knowledge), this skill runs a controlled experiment. It frames a single criterion, produces 2–4 candidates (at least one by the main agent, the rest by pinned external agents), blinds them by shuffling and stripping provenance, and sends them to 2–3 different external judges for ranking with justification. The user receives the anonymized candidates and verdicts, rules on the winner, and only then sees the provenance mapping. The experimental directory is deleted as cleanup."

[[skills.experiment.highlights]]
title = "Single Criterion"
description = "Every experiment has exactly one criterion that the candidates compete on. A candidate set without a criterion is taste-polling, not an experiment."

[[skills.experiment.highlights]]
title = "Provenance Stripping"
description = "Candidates are shuffled into letter-named files (A, B, …) with all provenance hints removed. The letter-to-producer mapping is written to mapping.txt and never shown before the ruling."

[[skills.experiment.highlights]]
title = "External Judge Panel"
description = "2–3 different external agents, pinned by model, each receive the blinded candidates and criterion. Every judge ranks the candidates and justifies its ranking in two sentences."

[[skills.experiment.highlights]]
title = "Safe External Production"
description = "External agents never write to a repo directly. When a future experiment needs repo access, a git worktree is created first; changes are collected via worktree diff, merging stays an explicit main-thread step."

[[skills.experiment.workflow]]
name = "Frame & Produce"
description = "Name the experiment and write the criterion. Produce 2–4 candidates."
details = "Name the experiment (kebab-case) and define the single criterion. Render 2–4 candidates into a temp directory, producing at least one yourself and dispatching external-agent briefs for the rest."

[[skills.experiment.workflow]]
name = "Blind"
description = "Shuffle, strip provenance, write mapping."
details = "Copy candidates to letter-named files (A, B, …) in shuffled order, stripping all provenance hints. Write the letter-to-producer mapping to mapping.txt."

[[skills.experiment.workflow]]
name = "Judge"
description = "Send blinded candidates to 2–3 external judges in parallel."
details = "Each judge receives the letter-named candidates and the criterion via an external-agent brief (pinned by model, tagged auditing). Each ranks and justifies in two sentences."

[[skills.experiment.workflow]]
name = "Rule & Conclude"
description = "Present verdicts, user rules, reveal mapping, clean up."
details = "Show the candidates and anonymized verdicts to the user. The user rules. Reveal the provenance mapping only after the ruling, report the outcome, then delete the experiment directory."

[skills.explore]
display_name = "Explore Unknowns by Oracle"
tagline = "Route every open question to its rightful source — world, human, or experiment."
short_summary = "Settle discussion unknowns by classifying each as world-, human-, or nobody-owned and dispatching it to its oracle for an evidence-backed ruling."
full_summary = "Explore keeps discussions honest by refusing to let unknowns pass as assumptions. Each open question is routed to exactly one oracle — research for world fact, interview for human preference, experiment for untried unknowns — so decisions land on evidence and explicit rulings. The conversation only proceeds once every blocking unknown is settled."
source_hash = "589a6ca43edc8ec0"
content_hash = "18fa880958e39b04"

[[skills.explore.highlights]]
title = "Three-Source Oracle Routing"
description = "Every unknown is classified as WORLD-, HUMAN-, or NOBODY-owned and settled by exactly one method: research, interview, or experiment. Misclassification is prevented by hard boundaries — never ask the world, never assume the human, never guess the experiment."

[[skills.explore.highlights]]
title = "Parallel Grounded Research"
description = "WORLD-owned unknowns launch one background explorer per question, each armed with web search and a strict brief template requiring dated sources, conflict notes, and confidence. The main thread waits for all briefs, then reports once — never a partial drip."

[[skills.explore.highlights]]
title = "Rationed Decision Interviews"
description = "HUMAN-owned unknowns are settled one decision-changing question at a time, each carrying a recommended answer and its reason. Related forks batch into a single call, keeping a session to roughly 4–6 questions and turning answers into explicit rulings."

[[skills.explore.highlights]]
title = "Experiments for Untried Unknowns"
description = "When nobody yet knows the answer, Explore dispatches the attune experiment skill. Its outcome returns as evidence the user still rules on, carried forward like any other settled decision."

[[skills.explore.workflow]]
name = "Announce and Classify"
description = "Announce the skill, then triage each open unknown by owner."
details = "State the explore skill is active, then sort every unknown into WORLD-, HUMAN-, or NOBODY-owned so each has exactly one settlement path."

[[skills.explore.workflow]]
name = "Spawn Parallel Research"
description = "Launch one grounded explorer per WORLD-owned unknown."
details = "Send one message with multiple tool calls, each carrying the full response contract, MUST/MUST NOT lists, and the brief template requiring dated sources."

[[skills.explore.workflow]]
name = "Validate and Report Briefs"
description = "Wait for all briefs, validate each, report once."
details = "Check source credibility and dates, resolve conflicts by authority and recency, then relay every brief verbatim in a single consolidated report."

[[skills.explore.workflow]]
name = "Interview the Human"
description = "Ask decision-changing HUMAN-owned questions one at a time."
details = "Pick the most decision-changing unknown, ask with a recommended answer and reason, state the ruling explicitly, and batch up to 4 independent forks per call."

[[skills.explore.workflow]]
name = "Dispatch Experiments"
description = "Send NOBODY-owned unknowns to the experiment skill."
details = "Hand off to attune experiment, accept its outcome as evidence, let the user rule on it, and carry the ruling into the active task artifact."
