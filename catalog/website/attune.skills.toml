# Maintained in catalog/website/ (generated by scripts/update-plugin-website.mjs on first resolve; edit freely — this file wins over any plugin-repo copy).

[skills.experiment]
display_name = "Experiment"
tagline = "Settle subjective questions by blind, evidence-driven comparison."
short_summary = "Produce 2-4 candidate outputs, strip provenance, collect external judge verdicts, then let the user rule — no guessing."
full_summary = "When a question can only be answered by trying (not by research or direct user knowledge), this skill runs a controlled experiment. It frames a single criterion, produces 2–4 candidates (at least one by the main agent, the rest by pinned external agents), blinds them by shuffling and stripping provenance, and sends them to 2–3 different external judges for ranking with justification. The user receives the anonymized candidates and verdicts, rules on the winner, and only then sees the provenance mapping. The experimental directory is deleted as cleanup."

[[skills.experiment.highlights]]
title = "Single Criterion"
description = "Every experiment has exactly one criterion that the candidates compete on. A candidate set without a criterion is taste-polling, not an experiment."

[[skills.experiment.highlights]]
title = "Provenance Stripping"
description = "Candidates are shuffled into letter-named files (A, B, …) with all provenance hints removed. The letter-to-producer mapping is written to mapping.txt and never shown before the ruling."

[[skills.experiment.highlights]]
title = "External Judge Panel"
description = "2–3 different external agents, pinned by model, each receive the blinded candidates and criterion. Every judge ranks the candidates and justifies its ranking in two sentences."

[[skills.experiment.highlights]]
title = "Safe External Production"
description = "External agents never write to a repo directly. When a future experiment needs repo access, a git worktree is created first; changes are collected via worktree diff, merging stays an explicit main-thread step."

[[skills.experiment.workflow]]
name = "Frame & Produce"
description = "Name the experiment and write the criterion. Produce 2–4 candidates."
details = "Name the experiment (kebab-case) and define the single criterion. Render 2–4 candidates into a temp directory, producing at least one yourself and dispatching external-agent briefs for the rest."

[[skills.experiment.workflow]]
name = "Blind"
description = "Shuffle, strip provenance, write mapping."
details = "Copy candidates to letter-named files (A, B, …) in shuffled order, stripping all provenance hints. Write the letter-to-producer mapping to mapping.txt."

[[skills.experiment.workflow]]
name = "Judge"
description = "Send blinded candidates to 2–3 external judges in parallel."
details = "Each judge receives the letter-named candidates and the criterion via an external-agent brief (pinned by model, tagged auditing). Each ranks and justifies in two sentences."

[[skills.experiment.workflow]]
name = "Rule & Conclude"
description = "Present verdicts, user rules, reveal mapping, clean up."
details = "Show the candidates and anonymized verdicts to the user. The user rules. Reveal the provenance mapping only after the ruling, report the outcome, then delete the experiment directory."

[skills.interview]
display_name = "Interview"
tagline = "Settle every unknown by the right oracle — research, ask, or experiment."
short_summary = "Routes every open unknown to its correct source: research for facts, ask the user for preferences, experiment for the untried."
full_summary = "Interview classifies every unknown as WORLD-owned (researchable fact), HUMAN-owned (user preference), or NOBODY-owned (unexplored). It eagerly launches parallel research for facts, asks the user a single decision-changing question at a time with a reasoned recommendation, and dispatches experiments for the untried — so discussions settle on evidence and rulings instead of assumptions."

[[skills.interview.highlights]]
title = "Three-Oracle Routing"
description = "Every unknown is classified as WORLD-owned, HUMAN-owned, or NOBODY-owned — facts are researched, preferences are asked, experiments are run. Never assume, never guess."

[[skills.interview.highlights]]
title = "Eager Parallel Research"
description = "The moment a WORLD-owned unknown is identified, multiple background research subagents launch in parallel. Each returns a compact validated brief — saving turns and keeping the conversation moving."

[[skills.interview.highlights]]
title = "Precise Human Interview"
description = "Ask exactly one decision-changing question at a time, always with a recommended answer and reasoning. Batch up to 4 independent forks in one call. Ration the ~4–6 questions per session on what truly changes outcomes."

[[skills.interview.highlights]]
title = "Explicit Ruling Carry-Forward"
description = "Every settled answer is stated explicitly and carried into the current artifact — the plan, document, or code it unblocks. An implicit ruling is not settled."

[[skills.interview.workflow]]
name = "Classify Unknown"
description = "Label each open unknown as WORLD, HUMAN, or NOBODY."
details = "Determine whether the answer lives in researchable fact, the user's head, or the unexplored. This classification drives everything that follows."

[[skills.interview.workflow]]
name = "Research WORLD-owned"
description = "Launch parallel Explore subagents with WebSearch."
details = "For every WORLD-owned unknown, dispatch one background subagent per candidate in a single message. Validate briefs for source credibility, dates, and conflict resolution."

[[skills.interview.workflow]]
name = "Interview HUMAN-owned"
description = "Ask one question at a time with a reasoned recommendation."
details = "Pick the single most decision-changing HUMAN-owned unknown. Use AskUserQuestion with your recommended answer. Ration to ~4–6 questions per session; batch independent forks."

[[skills.interview.workflow]]
name = "Run Experiments"
description = "Dispatch the attune:experiment skill for NOBODY-owned unknowns."
details = "When no one knows the answer until it is tried, launch an experiment. Its outcome returns as evidence for the user to rule on."

[[skills.interview.workflow]]
name = "Carry Ruling Forward"
description = "State the settled answer and apply it to the current artifact."
details = "Before asking the next question, explicitly state the ruling and carry it into the work it unblocks — the active plan, document, or code. An implicit ruling is not settled."
