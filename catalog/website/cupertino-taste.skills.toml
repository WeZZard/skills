[skills.design-fluid-interface]
display_name = "Design Fluid Interfaces"
tagline = "Shape interaction as a continuous exchange between person and interface."
short_summary = "Design, review, diagnose, or implement fluid interaction behavior for Apple platforms without inventing motion values."
full_summary = "Treat interaction as a continuous exchange optimized for control, continuity, and clear intent, with motion as supporting evidence. Trace each action through cue, contact, recognition, tracking, commitment, release, settlement, and escape, then evaluate it through response, agency, continuity, intent, feedback, character, and comfort. Never invent numeric motion values; keep parameters symbolic and tune in prototype."
source_hash = "b2498d256a0f37f5"
content_hash = "974fe6126b9d238b"

[[skills.design-fluid-interface.highlights]]
title = "Evidence-Calibrated Findings"
description = "Classify what each artifact can prove—from static image to runnable prototype to real device—and deliver only the partial result the evidence supports, separating confirmed findings, hypotheses, and runtime checks."

[[skills.design-fluid-interface.highlights]]
title = "Full Interaction Lifecycle"
description = "Map every important action through cue, contact, recognition, tracking, commitment, release, settlement, and escape as a compact state/transition table rather than a list of animation durations."

[[skills.design-fluid-interface.highlights]]
title = "Seven Fluidity Lenses"
description = "Evaluate traced paths against response, agency, continuity, intent, feedback and teaching, character, and comfort and reach—covering cancellation, interruption, retargeting, and Reduce Motion meaningfully."

[[skills.design-fluid-interface.highlights]]
title = "No Invented Motion Values"
description = "Use only project, system, documentation, or measured-prototype values; otherwise name parameters symbolically and mark them tune in prototype, so guidance never ships fabricated thresholds or stale APIs."

[[skills.design-fluid-interface.workflow]]
name = "Establish the task"
description = "Follow the user's verb to set review, design, or implement mode."
details = "Determine platform, framework, inputs, goals, states, outcomes, and cancellation paths; infer from the project and ask one focused question only when a missing choice would materially change behavior."

[[skills.design-fluid-interface.workflow]]
name = "Read required references"
description = "Load fluid principles and current Apple guidance first."
details = "Read fluid-principles.md and current-apple-guidance.md before recommending; current Apple documentation overrides the 2018 session examples."

[[skills.design-fluid-interface.workflow]]
name = "Calibrate the evidence"
description = "Classify what the artifact can actually prove."
details = "Map static image, spec, source, recording, runnable prototype, or real-device evidence to the claims it supports; distinguish symptoms from observed behavior and label causes as hypotheses until confirmed."

[[skills.design-fluid-interface.workflow]]
name = "Map and judge the interaction"
description = "Trace the lifecycle and apply the fluidity lenses."
details = "Represent nontrivial interactions as state/transition tables and evaluate each path through response, agency, continuity, intent, feedback, character, and comfort lenses."

[[skills.design-fluid-interface.workflow]]
name = "Produce and verify the result"
description = "Deliver review, design, or implementation per the verb."
details = "Lead with highest-impact findings or deliver a full spec with prototype scenarios; keep parameters symbolic when no numeric evidence exists and exercise the interaction through its runnable interface when available."
