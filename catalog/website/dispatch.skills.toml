[skills.audit]
display_name = "Audit Work With Panel"
tagline = "Cross-check completed work with a parallel panel of external models."
short_summary = "Dispatch a self-contained audit brief to Codex and Kimi in parallel, collect file-backed reports, and compile a digest of agreements and disagreements for the user to rule on."
full_summary = "The same audit brief goes to Codex and Kimi — two external agent CLIs with different biases — in one parallel dispatch. Their verbatim reports land on disk, then a compiled digest surfaces agreements as strong signals, splits as judgment calls, and every cited finding carries its report's path. The user rules before any finding is acted on."
source_hash = "afeedcac2ceb4d7f"
content_hash = "6e5230a88c718cd4"

[[skills.audit.highlights]]
title = "Diverse-Model Panel"
description = "Codex and Kimi review the same work in parallel. Each model misses different things, so findings they agree on are strong signals while splits mark judgment calls worth your attention."

[[skills.audit.highlights]]
title = "One Identical Brief"
description = "A single self-contained brief — with material inlined or readable paths cited — goes to every auditor. Identical input is what makes agreement and disagreement meaningful."

[[skills.audit.highlights]]
title = "File-Backed Reports"
description = "Each auditor's report is written verbatim to the audit directory, and every cited finding in the digest carries its report's file path — a backtrace you can reopen at any time."

[[skills.audit.highlights]]
title = "User Rules, Agent Waits"
description = "The digest presents findings and your assessment of the unique ones, but no finding is acted on until you rule. Disagreements are flagged for your judgment, never silently dropped."

[[skills.audit.workflow]]
name = "Load Dispatch Interface"
description = "Invoke the use-external-agents skill for the router and brief contract."
details = "This skill builds on the external-agents router, the task brief contract, and the matrix call that reports which panel agents are installed and usable right now."

[[skills.audit.workflow]]
name = "Scope The Audit"
description = "Name the audit and state what is being audited and the questions."
details = "Pick a kebab-case name; describe the diff, document, or decision under review; and list the specific questions the auditors must answer."

[[skills.audit.workflow]]
name = "Compose The Brief"
description = "Write one self-contained brief tagged for the codex-kimi panel."
details = "Inline the material or point at readable paths, set TAGS: auditing and AGENTS: codex kimi, and require each auditor's full report with claim, evidence, and severity per finding."

[[skills.audit.workflow]]
name = "Dispatch And Persist"
description = "Send the brief once; write each verbatim report to the audit directory."
details = "One router call launches the panel in parallel and returns each report; write them verbatim to ${TMPDIR:-/tmp}/dispatch-audit/<name>/<agent>.md before compiling."

[[skills.audit.workflow]]
name = "Compile And Wait For Ruling"
description = "Report agreements, unique findings, and disagreements; then stop."
details = "Surface agreements first, unique findings with your assessment, and splits flagged for the user's judgment — every finding carries its report path. Act only after the user rules."

[skills.image-generation]
display_name = "Image Generation"
tagline = "Dispatch one brief to every image-capable agent concurrently and pick from the options."
short_summary = "Generate images by fanning a single brief across all usable image-capable agents concurrently, presenting each result as a candidate with artifact paths."
full_summary = "This skill sends one self-contained image brief to every available image-capable external agent in parallel, collecting their results as candidate options with explicit artifact paths. It maintains a failure record so any agent that hits a login or quota issue is never retried until the user clears it, preventing repeated dead-ends."
source_hash = "ebcc6880e9c6ea2b"
content_hash = "494261034358a50c"

[[skills.image-generation.highlights]]
title = "Concurrent Multi-Agent Dispatch"
description = "One brief reaches every usable image-capable agent at once, returning several candidate images per request instead of a single take-it-or-leave-it output."

[[skills.image-generation.highlights]]
title = "Failure Memory"
description = "Login and quota failures are recorded to a JSON file, and recorded agents are skipped on every subsequent dispatch until the user clears the record."

[[skills.image-generation.highlights]]
title = "Verbatim Artifact Paths"
description = "Every ARTIFACT_PATH line from each agent is passed through untouched, so the user sees exact on-disk paths labeled by the agent that produced each image."

[[skills.image-generation.highlights]]
title = "User Picks, Agent Never Picks"
description = "The skill presents all generated options and never selects a best image itself, leaving the choice entirely to the user."

[[skills.image-generation.workflow]]
name = "Load the Dispatch Interface"
description = "Invoke the plugin's use-external-agents skill first."
details = "Builds on the router, task brief contract, and facts-before-use matrix call that use-external-agents defines, without restating them."

[[skills.image-generation.workflow]]
name = "Check the Failure Record"
description = "Read the failures.json file and skip recorded agents."
details = "Reads the JSON array of agent failure entries; a missing file is an empty record. If no agent remains, the skill reports and stops for the user to clear."

[[skills.image-generation.workflow]]
name = "Compose the Brief"
description = "Write one self-contained image prompt with AGENTS and Response sections."
details = "Crafts a fully self-contained prompt tagged image-generation, listing the image-capable agents not in the failure record, and demanding explicit ARTIFACT_PATH lines back."

[[skills.image-generation.workflow]]
name = "Dispatch Concurrently"
description = "Send the brief to the router for parallel agent launches."
details = "The router launches all listed agents in parallel and returns each agent's reply together with its artifact paths."

[[skills.image-generation.workflow]]
name = "Record Failures and Present"
description = "Append any login or quota failure, then show every image."
details = "Login and quota failures are appended to the record before anything else, then every generated image is shown by its artifact path, labeled by producing agent for the user to pick."

[skills.use-external-agents]
display_name = "Use External Agents"
tagline = "One router, one brief — delegate tasks to external agent CLIs safely."
short_summary = "Dispatch tasks to external agent CLIs through a single router using a self-contained task brief, with facts probed in one matrix call and outputs returned as evidence."
full_summary = "Use External Agents gives the main conversation a single, disciplined path for delegating work to external agent CLIs — the dispatch external-agent router. You compose one self-contained task brief that pins the exact agents, gather every agent fact in a single matrix probe, and treat returned output as evidence while synthesis stays with you and the human. Write isolation via worktrees keeps repository delegations safe and reviewable."
source_hash = "b8cfd82fedd2e119"
content_hash = "2e946c4fb3d6c618"

[[skills.use-external-agents.highlights]]
title = "One Router, One Brief Contract"
description = "All external agent work flows through the dispatch:external-agent router subagent, launched once per task brief. The brief carries metadata, a pinned AGENTS line, a fully self-contained task prompt, and a response shape — the external agent sees nothing else."

[[skills.use-external-agents.highlights]]
title = "Facts Probed in One Matrix Call"
description = "A single `external-agents.sh matrix` call reports which agents are installed, usable, and capable against the registry. The marker path is passed in the brief so the router never re-probes, and volatile capability is treated as a fresh fact that fails closed."

[[skills.use-external-agents.highlights]]
title = "Write Isolation Through Worktrees"
description = "Repository-writing delegations run inside a created git worktree. Changes are collected as evidence, merged or discarded explicitly in the main conversation, and the worktree is removed — external agents never write to the repo directly."

[[skills.use-external-agents.highlights]]
title = "Output as Evidence, Not Decisions"
description = "External CLI output is returned verbatim and treated as evidence. Synthesis and every ruling stay in the main conversation with the human, and launch parameters are derived from the registry baseline verified against fresh --help output."

[[skills.use-external-agents.workflow]]
name = "Announce and Resolve Root"
description = "Announce the router and resolve ATTUNE_ROOT."
details = "Announce dispatching through the router, then resolve ATTUNE_ROOT to the absolute path two directories above this skill's directory before running any command."

[[skills.use-external-agents.workflow]]
name = "Probe Agent Facts in One Matrix Call"
description = "Run the matrix probe once, pick a marker path."
details = "Run `external-agents.sh matrix <marker.json>` to learn installed, usable, and capable agents in a single call; the marker persists facts for free re-render later."

[[skills.use-external-agents.workflow]]
name = "Compose the Task Brief"
description = "Write the self-contained brief in the main conversation."
details = "Fill the brief contract: GOAL, TAGS, pinned AGENTS, the CAPABILITIES_MARKER path, a fully self-contained External Agent Task Prompt, and the Response shape including artifact paths."

[[skills.use-external-agents.workflow]]
name = "Dispatch Through the Router"
description = "Launch the router subagent once with the brief."
details = "Launch dispatch:external-agent with the whole brief as its prompt; for repository writes, first create a worktree and point the agent there, then collect changes via worktree.sh diff as evidence."

[[skills.use-external-agents.workflow]]
name = "Synthesize From Evidence"
description = "Treat output as evidence, merge or discard explicitly."
details = "Receive the router's response verbatim as evidence, synthesize and rule in the main conversation with the human, merge or discard worktree changes explicitly, then remove the worktree."
