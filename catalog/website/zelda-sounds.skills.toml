[skills.configure-zelda-sounds]
display_name = "Zelda Sounds Configurator"
tagline = "Bring the magic of Hyrule to your terminal with custom sound effects for every Claude Code event."
short_summary = "Launch a browser-based GUI to assign Zelda sound effects to Claude Code hook events, with instant live reload."
full_summary = "The Zelda Sounds Configurator lets you personalize your Claude Code experience by assigning iconic Zelda sound effects to 9 semantic moments (like success, error, or warning). It launches a local web server that opens a GUI in your browser, where you can preview sounds, choose a configuration file path, and save your overrides. Changes take effect immediately with no reload needed, bringing a touch of Hyrule to your development workflow."
source_hash = "00304ae2deedbb19"
content_hash = "f216ef25c37b6be0"

[[skills.configure-zelda-sounds.highlights]]
title = "Browser-Based GUI"
description = "A clean, intuitive interface opens in your default browser, making it easy to preview and assign sounds without touching the command line."

[[skills.configure-zelda-sounds.highlights]]
title = "9 Semantic Moments"
description = "Assign unique sounds to 9 distinct Claude Code events, from success and error to warning and info, for instant audio feedback."

[[skills.configure-zelda-sounds.highlights]]
title = "Instant Live Reload"
description = "Save your configuration and hear changes immediately — no restart or reload required, keeping your flow uninterrupted."

[[skills.configure-zelda-sounds.highlights]]
title = "Custom Config Path"
description = "Choose where to save your sound overrides, giving you full control over your configuration files and easy sharing between projects."

[[skills.configure-zelda-sounds.workflow]]
name = "Rebuild Configurator"
description = "Ensure the configurator bundle is up to date."
details = "Run npm install and build inside the configurator directory to compile the latest version of the GUI."

[[skills.configure-zelda-sounds.workflow]]
name = "Launch Server"
description = "Start the configurator web server on a free port."
details = "Run the configurator.mjs script with PORT=0 to automatically pick an available port and print the URL."

[[skills.configure-zelda-sounds.workflow]]
name = "Open Browser"
description = "Open the provided URL in your browser."
details = "The server prints http://localhost:<port>; copy and paste it into your browser to access the GUI."

[[skills.configure-zelda-sounds.workflow]]
name = "Assign Sounds"
description = "Preview and assign sounds to events."
details = "Use the GUI to listen to sound previews and map each of the 9 semantic moments to your preferred Zelda sound effect."

[[skills.configure-zelda-sounds.workflow]]
name = "Save Configuration"
description = "Save your overrides to a config file."
details = "Choose a file path and save; changes take effect immediately with live reload, no restart needed."
